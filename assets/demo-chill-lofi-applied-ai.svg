  <text x="130" y="58" fill="#cbd5e1" font-family="Menlo, Monaco, monospace" font-size="18">python3 -m src.main</text>
  <text x="38" y="96" fill="#93c5fd" font-family="Menlo, Monaco, monospace" font-size="18">=== Chill Lofi ===</text>
  <text x="38" y="126" fill="#e2e8f0" font-family="Menlo, Monaco, monospace" font-size="16">Input: {"genre": "lofi", "mood": "chill", "energy": 0.4, "likes_acoustic": True}</text>
  <text x="38" y="152" fill="#e2e8f0" font-family="Menlo, Monaco, monospace" font-size="16">Style: curator | avg confidence=0.72 | genre diversity=0.60 | retrieval coverage=1.00</text>
  <text x="38" y="188" fill="#fde68a" font-family="Menlo, Monaco, monospace" font-size="15">Warnings:</text>
  <text x="62" y="214" fill="#cbd5e1" font-family="Menlo, Monaco, monospace" font-size="15">- genre-diversity penalties applied to 2 recommendations</text>
  <text x="62" y="238" fill="#cbd5e1" font-family="Menlo, Monaco, monospace" font-size="15">- artist-diversity penalty applied to 1 recommendation</text>
  <text x="62" y="262" fill="#cbd5e1" font-family="Menlo, Monaco, monospace" font-size="15">- diversity warning: the final top-k list still clusters around narrow genres</text>
  <text x="38" y="298" fill="#a7f3d0" font-family="Menlo, Monaco, monospace" font-size="15">Workflow trace highlight: retrieval -&gt; scoring -&gt; reranking -&gt; confidence</text>
  <text x="38" y="334" fill="#f8fafc" font-family="Menlo, Monaco, monospace" font-size="17">Top pick: Library Rain | Base 9.69 | Adjusted 9.69 | Confidence 0.92</text>
  <text x="62" y="360" fill="#cbd5e1" font-family="Menlo, Monaco, monospace" font-size="15">Retrieved context: genre_notes/lofi + mood_notes/chill</text>
  <text x="62" y="384" fill="#cbd5e1" font-family="Menlo, Monaco, monospace" font-size="15">Explanation: Curator note with local genre and mood notes grounded in retrieval.</text>
  <text x="38" y="420" fill="#f8fafc" font-family="Menlo, Monaco, monospace" font-size="17">Second pick: Midnight Coding | Adjusted 8.78 after genre repetition penalty</text>
  <text x="38" y="456" fill="#f8fafc" font-family="Menlo, Monaco, monospace" font-size="17">Third pick: Focus Flow | Adjusted 5.92 after genre + artist repetition penalties</text>
  <text x="62" y="482" fill="#cbd5e1" font-family="Menlo, Monaco, monospace" font-size="15">Self-check: the system admits when reranking helps but the result list is still narrow.</text>
  <text x="38" y="522" fill="#93c5fd" font-family="Menlo, Monaco, monospace" font-size="15">AI features shown: diversity-aware self-critique, warnings, retrieval-backed explanation, confidence.</text>
